services:
  frontend:
    build: ./frontend
    ports:
      - '8081:80'
    depends_on:
      bff:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - diplo-network

  bff:
    build: ./bff
    ports:
      - '3000:3000'
    environment:
      - BACKEND_URL=http://backend:8080
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - diplo-network

  backend:
    build: ./backend
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - diplo-network

networks:
  diplo-network:
    driver: bridge
