name: CI - Análisis SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: Escaneo de SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Compilar Backend con Maven
        run: mvn clean compile -pl backend

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Podés cambiarlo

      - name: Instalar dependencias y tests (BFF)
        run: |
          cd bff
          npm ci
          npm run test # Cambialo por tu script exacto de coverage

      - name: Instalar dependencias y tests (Frontend)
        run: |
          cd frontend
          npm ci
          npm run test # Cambialo por tu script exacto de coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
