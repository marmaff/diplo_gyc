name: CI PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      bff: ${{ steps.filter.outputs.bff }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            bff:
              - 'bff/**'
            backend:
              - 'backend/**'

  frontend:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test
        working-directory: frontend

  bff:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.bff == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: bff
      - run: npm run lint
        working-directory: bff
      - run: npm run test
        working-directory: bff


  backend:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn checkstyle:check -pl backend
      - run: mvn test -pl backend
      - run: mvn verify -pl backend