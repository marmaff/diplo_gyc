name: CI PR

on:
  pull_request:
    branches:
      - main
      - production
    types: [opened, synchronize, reopened, closed]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      bff: ${{ steps.filter.outputs.bff }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            bff:
              - 'bff/**'
            backend:
              - 'backend/**'

  ci-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - uses: sonarsource/sonarcloud-github-action@master
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/${{ github.repository_owner }}/diplo_gyc-frontend:${{ github.head_ref }} ./frontend
      - run: docker push ghcr.io/${{ github.repository_owner }}/diplo_gyc-frontend:${{ github.head_ref }}

  ci-bff:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.bff == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: bff
      - run: npm run lint
        working-directory: bff
      - run: npm run test
        working-directory: bff
      - uses: sonarsource/sonarcloud-github-action@master
        with:
          projectBaseDir: bff
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/${{ github.repository_owner }}/diplo_gyc-bff:${{ github.head_ref }} ./bff
      - run: docker push ghcr.io/${{ github.repository_owner }}/diplo_gyc-bff:${{ github.head_ref }}

  ci-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: mvn checkstyle:check -pl backend
      - run: mvn test -pl backend
      - run: mvn verify -pl backend
      - uses: sonarsource/sonarcloud-github-action@master
        with:
          projectBaseDir: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/${{ github.repository_owner }}/diplo_gyc-backend:${{ github.head_ref }} ./backend
      - run: docker push ghcr.io/${{ github.repository_owner }}/diplo_gyc-backend:${{ github.head_ref }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [ci-frontend, ci-bff, ci-backend]
    if: github.base_ref == 'main' && github.event.pull_request.merged == true
    steps:
      - name: Deploy a Staging
        run: echo "PLACEHOLDER — Reemplazar con proveedor: Railway / Render / VPS / K8s"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [ci-frontend, ci-bff, ci-backend]
    if: github.base_ref == 'production' && github.event.pull_request.merged == true
    steps:
      - name: Deploy a Producción (Rolling Update)
        run: echo "PLACEHOLDER — Reemplazar con proveedor: Railway / Render / VPS / K8s"
