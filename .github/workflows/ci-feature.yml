name: CI Feature

on:
  push:
    branches:
      - 'feature_**'
      - 'hotfix_**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      bff: ${{ steps.filter.outputs.bff }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            bff:
              - 'bff/**'
            backend:
              - 'backend/**'

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test
        working-directory: frontend

  lint-and-test-bff:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.bff == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: bff/node_modules
          key: bff-${{ hashFiles('bff/package-lock.json') }}
      - run: npm ci
        working-directory: bff
      - run: npm run lint
        working-directory: bff
      - run: npm run test
        working-directory: bff

  lint-and-test-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: backend-${{ hashFiles('backend/pom.xml') }}
      - run: mvn checkstyle:check -pl backend
      - run: mvn test -pl backend
      - run: mvn verify -pl backend
